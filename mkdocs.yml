site_name: Talamus
site_description: Local-first memory with time, meaning, and verifiability — for your second brain and your AI agents.
site_url: https://ampres-ai.github.io/talamus/
repo_url: https://github.com/ampres-ai/talamus
repo_name: ampres-ai/talamus

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Local-first agent memory: local-first-agent-memory.md
  - Commands: commands.md
  - Configuration: configuration.md
  - Multi-brain: multi-brain.md
  - Ontology Lab: ontology.md
  - Measuring retrieval: evaluation.md
  - Benchmarks: benchmarks.md
  - For agents: agent-tool-calling.md
  - Architecture: architecture.md
  - Design principles: design-principles.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.superfences
