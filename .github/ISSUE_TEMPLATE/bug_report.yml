name: Bug report
description: Report a reproducible problem in Talamus.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Talamus. Please remove secrets and private brain content before posting.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Give the smallest sequence of commands or actions that reproduces the problem.
      placeholder: |
        1. Install ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Talamus version
      placeholder: Output of `talamus --version`
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Sanitized logs, stack traces, or screenshots. Never include credentials or private brain content.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, secrets, personal data, and private brain content.
          required: true
        - label: This is not a security vulnerability; security reports use the private advisory form.
          required: true
