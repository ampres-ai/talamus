name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/talamus/
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: pypi-publish
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install release and quality tools
        run: python -m pip install --upgrade build twine ".[dev]"

      - name: Validate release tag
        shell: python
        run: |
          import os
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              version = tomllib.load(fh)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              print(f"Release tag {tag!r} does not match pyproject version {version!r}.")
              print(f"Use tag {expected!r}, or update pyproject.toml before publishing.")
              sys.exit(1)

      - name: Run the quality gate
        run: python dev.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
