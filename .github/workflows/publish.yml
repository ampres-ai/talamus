name: Publish release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to recover (for example, v1.0.2)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/talamus/
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: pypi-publish
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install release and quality tools
        run: python -m pip install --upgrade build twine ".[dev]"

      - name: Validate release tag
        env:
          REQUESTED_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
        shell: python
        run: |
          import os
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              version = tomllib.load(fh)["project"]["version"]

          tag = os.environ["REQUESTED_TAG"]
          expected = f"v{version}"
          if tag != expected:
              print(f"Requested release tag {tag!r} does not match pyproject version {version!r}.")
              print(f"Use tag {expected!r}, or update pyproject.toml before publishing.")
              sys.exit(1)

          if os.environ["GITHUB_EVENT_NAME"] == "release" and os.environ["GITHUB_REF_NAME"] != tag:
              print(f"Release ref {os.environ['GITHUB_REF_NAME']!r} does not match {tag!r}.")
              sys.exit(1)

      - name: Run the quality gate
        run: python dev.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp:
    name: Publish to MCP Registry
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install verified MCP publisher
        run: |
          curl -L https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz -o mcp-publisher.tar.gz
          echo "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
