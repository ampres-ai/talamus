name: Container

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - src/**
      - scripts/smoke_mcp_stdio.py
      - .github/workflows/container.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - src/**
      - scripts/smoke_mcp_stdio.py
      - .github/workflows/container.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-smoke-publish:
    name: Build, MCP smoke, publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read package version
        id: package
        shell: python
        run: |
          import os
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              version = tomllib.load(fh)["project"]["version"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={version}", file=output)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container locally
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: |
            ghcr.io/ampres-ai/talamus:${{ steps.package.outputs.version }}
            ghcr.io/ampres-ai/talamus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install MCP smoke-test client
        run: python -m pip install "mcp>=1.0"

      - name: Initialize container and discover tools
        run: >-
          python scripts/smoke_mcp_stdio.py
          docker run --rm -i
          ghcr.io/ampres-ai/talamus:${{ steps.package.outputs.version }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned container
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/ampres-ai/talamus:${{ steps.package.outputs.version }}
          docker push ghcr.io/ampres-ai/talamus:latest
